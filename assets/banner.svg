<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Schema Sentinel</title>
  <desc id="desc">Catch dataset drift before it breaks your pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1600" height="500" rx="36" fill="url(#bg)"/>
  <circle cx="1400" cy="90" r="130" fill="#38BDF8" fill-opacity="0.08"/>
  <circle cx="1380" cy="100" r="220" fill="#60A5FA" fill-opacity="0.07"/>
  <circle cx="220" cy="410" r="180" fill="#38BDF8" fill-opacity="0.08"/>
  <g opacity="0.12">
    <path d="M0 100H1600" stroke="white"/>
    <path d="M0 200H1600" stroke="white"/>
    <path d="M0 300H1600" stroke="white"/>
    <path d="M0 400H1600" stroke="white"/>
  </g>
  <g opacity="0.14">
    <path d="M120 0V500" stroke="white"/>
    <path d="M320 0V500" stroke="white"/>
    <path d="M520 0V500" stroke="white"/>
    <path d="M720 0V500" stroke="white"/>
    <path d="M920 0V500" stroke="white"/>
    <path d="M1120 0V500" stroke="white"/>
    <path d="M1320 0V500" stroke="white"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="88" y="96" width="900" height="308" rx="28" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
  </g>
  <text x="128" y="180" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="66" font-weight="800" letter-spacing="-2">
    Schema Sentinel
  </text>
  <text x="128" y="234" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="500">
    Catch dataset drift before it breaks your pipeline.
  </text>
  <text x="128" y="278" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">
    CSV schema comparison • risk scoring • Markdown + HTML reports • CI-friendly exit codes
  </text>
  <g transform="translate(128 320)">
    <rect width="150" height="44" rx="22" fill="url(#accent)"/>
    <text x="75" y="28" text-anchor="middle" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">CRITICAL</text>
    <rect x="166" y="0" width="148" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="240" y="28" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Stability 84/100</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1098" y="92" width="414" height="316" rx="28" fill="#F8FAFC"/>
  </g>
  <rect x="1132" y="124" width="110" height="36" rx="18" fill="#EFF6FF"/>
  <text x="1187" y="147" text-anchor="middle" fill="#2563EB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Summary</text>
  <text x="1132" y="210" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="800" letter-spacing="-2">04</text>
  <text x="1132" y="242" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">critical + high findings</text>
  <g transform="translate(1132 278)">
    <rect width="330" height="18" rx="9" fill="#E2E8F0"/>
    <rect width="220" height="18" rx="9" fill="#2563EB"/>
  </g>
  <text x="1132" y="338" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Added columns</text>
  <text x="1294" y="338" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">1</text>
  <text x="1132" y="370" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Removed columns</text>
  <text x="1294" y="370" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">1</text>
  <text x="1328" y="338" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Type change</text>
  <text x="1458" y="338" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">1</text>
  <text x="1328" y="370" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Numeric drift</text>
  <text x="1458" y="370" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">2</text>
</svg>

